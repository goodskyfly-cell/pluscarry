<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>國小數學練習題 - A4 完美對齊版</title>
    <style>
        :root {
            --page-width: 210mm;
            --page-height: 297mm;
            --math-font-size: 32pt;
            --carry-size: 30px;
            --grid-cols: 4;
            --grid-rows: 5;
            --grid-gap: 10px;
        }

        @page { size: A4; margin: 0; }
        body {
            margin: 0; padding: 0;
            background-color: #f8f9fa;
            font-family: "Microsoft JhengHei", sans-serif;
            display: flex; flex-direction: column; align-items: center;
        }

        .controls {
            background: #2c3e50; color: white; padding: 12px;
            width: 100%; text-align: center; position: sticky; top: 0; z-index: 100;
        }
        .btn {
            padding: 6px 12px; margin: 2px; font-size: 14px;
            cursor: pointer; border: none; border-radius: 4px;
            background: #7f8c8d; color: white;
        }
        .btn.active { background: #27ae60; font-weight: bold; }
        .btn-refresh { background: #e67e22; }

        /* A4 紙張容器 */
        .a4-page {
            width: var(--page-width);
            height: var(--page-height);
            background: white;
            padding: 8mm 12mm; /* 稍微縮小邊距 */
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* 確保絕不產生第二頁 */
            box-shadow: 0 0 20px rgba(0,0,0,0.15);
            margin: 10px 0;
        }

        .header h1 { text-align: center; margin: 0 0 5px 0; font-size: 22pt; }
        .info-bar {
            display: flex; justify-content: space-around;
            font-size: 13pt; margin-bottom: 10px;
            border-bottom: 2px solid #333; padding-bottom: 5px;
        }

        /* 題目網格佈局 */
        .problem-grid {
            display: grid;
            grid-template-columns: repeat(var(--grid-cols), 1fr);
            grid-template-rows: repeat(var(--grid-rows), 1fr);
            flex-grow: 1; /* 自動填滿剩餘高度 */
            gap: var(--grid-gap);
            align-items: center;
        }

        .math-box { 
            display: flex; justify-content: center; align-items: center; 
            height: 100%; width: 100%;
        }

        /* 直式核心結構 */
        .vertical-math {
            display: grid;
            grid-template-columns: calc(var(--carry-size) * 0.7) var(--carry-size) var(--carry-size) var(--carry-size);
            grid-template-rows: var(--carry-size) auto auto 4px auto;
            font-size: var(--math-font-size);
            align-items: center; justify-items: center;
            line-height: 1.1;
        }

        .carry-box {
            width: var(--carry-size); height: var(--carry-size);
            border: 1.5px dashed #95a5a6; visibility: hidden;
            box-sizing: border-box;
        }
        .carry-box.visible { visibility: visible; }
        
        .carry-100 { grid-column: 2; grid-row: 1; } 
        .carry-10 { grid-column: 3; grid-row: 1; }  

        .num-t { grid-column: 3; }
        .num-o { grid-column: 4; }
        .operator { grid-column: 1; grid-row: 3; font-size: 0.7em; }
        .line { grid-column: 1 / span 4; grid-row: 4; border-bottom: 2px solid black; width: 100%; }

        @media print {
            .controls { display: none; }
            body { background: none; }
            .a4-page { margin: 0; box-shadow: none; }
        }
    </style>
</head>
<body>

<div class="controls">
    <div class="control-group">
        <button class="btn active" id="mode-2-1" onclick="setMode('2-1')">二位+一位</button>
        <button class="btn" id="mode-2-2-10" onclick="setMode('2-2-10')">二加二(進十位)</button>
        <button class="btn" id="mode-2-2-100" onclick="setMode('2-2-100')">二加二(進百位)</button>
        |
        <button class="btn" id="size-3-3" onclick="setGrid(3,3)">3x3 (9題)</button>
        <button class="btn" id="size-4-4" onclick="setGrid(4,4)">4x4 (16題)</button>
        <button class="btn active" id="size-4-5" onclick="setGrid(4,5)">4x5 (20題)</button>
        <button class="btn btn-refresh" onclick="generate()">↺ 重新換題</button>
    </div>
</div>

<div class="a4-page">
    <div class="header"><h1 id="title">二位數加一位數進位練習</h1></div>
    <div class="info-bar">
        <span>班級：__________</span> <span>姓名：__________</span> <span>座號：____</span>
    </div>
    <div id="mainGrid" class="problem-grid"></div>
</div>

<script>
    let currentMode = '2-1';
    let gCols = 4, gRows = 5;

    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.control-group:first-child .btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`mode-${mode}`).classList.add('active');
        const titles = { '2-1': '二位數加一位數進位練習', '2-2-10': '二加二 (進十位)', '2-2-100': '二加二 (進百位)' };
        document.getElementById('title').innerText = titles[mode];
        generate();
    }

    function setGrid(cols, rows) {
        gCols = cols; gRows = rows;
        document.querySelectorAll('.btn').forEach(b => { if(b.id.startsWith('size')) b.classList.remove('active'); });
        document.getElementById(`size-${cols}-${rows}`).classList.add('active');
        
        const root = document.documentElement;
        // 核心修正：根據題數大幅度調整間距與字體大小，確保 A4 空間足夠
        if(cols === 3) {
            root.style.setProperty('--math-font-size', '44pt');
            root.style.setProperty('--carry-size', '40px');
            root.style.setProperty('--grid-gap', '20px');
        } else if(cols === 4 && rows === 4) {
            root.style.setProperty('--math-font-size', '32pt');
            root.style.setProperty('--carry-size', '30px');
            root.style.setProperty('--grid-gap', '10px');
        } else { // 4x5
            root.style.setProperty('--math-font-size', '28pt');
            root.style.setProperty('--carry-size', '26px');
            root.style.setProperty('--grid-gap', '5px');
        }
        root.style.setProperty('--grid-cols', cols);
        root.style.setProperty('--grid-rows', rows);
        generate();
    }

    function generate() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = '';
        const total = gCols * gRows;

        for (let i = 0; i < total; i++) {
            let n1_t, n1_o, n2_t = 0, n2_o, isC10 = false, isC100 = false;

            if (currentMode === '2-1') {
                n1_t = Math.floor(Math.random() * 8) + 1;
                n1_o = Math.floor(Math.random() * 9) + 1;
                do { n2_o = Math.floor(Math.random() * 9) + 1; } while (n1_o + n2_o < 10);
                isC10 = true;
            } else if (currentMode === '2-2-10') {
                do {
                    n1_t = Math.floor(Math.random() * 4) + 1; n1_o = Math.floor(Math.random() * 9) + 1;
                    n2_t = Math.floor(Math.random() * 4) + 1; n2_o = Math.floor(Math.random() * 9) + 1;
                    isC10 = (n1_o + n2_o >= 10);
                    isC100 = (n1_t + n2_t + (isC10 ? 1 : 0) >= 10);
                } while (!isC10 || isC100);
            } else {
                do {
                    n1_t = Math.floor(Math.random() * 9) + 1; n1_o = Math.floor(Math.random() * 9) + 1;
                    n2_t = Math.floor(Math.random() * 9) + 1; n2_o = Math.floor(Math.random() * 9) + 1;
                    isC10 = (n1_o + n2_o >= 10);
                    isC100 = (n1_t + n2_t + (isC10 ? 1 : 0) >= 10);
                } while (!isC100);
            }

            const item = document.createElement('div');
            item.className = 'math-box';
            item.innerHTML = `
                <div class="vertical-math">
                    <div class="carry-box carry-100 ${isC100 ? 'visible' : ''}"></div>
                    <div class="carry-box carry-10 ${isC10 ? 'visible' : ''}"></div>
                    <div class="num-t" style="grid-row: 2;">${n1_t}</div>
                    <div class="num-o" style="grid-row: 2;">${n1_o}</div>
                    <div class="operator">+</div>
                    <div class="num-t" style="grid-row: 3;">${n2_t || ''}</div>
                    <div class="num-o" style="grid-row: 3;">${n2_o}</div>
                    <div class="line"></div>
                </div>`;
            grid.appendChild(item);
        }
    }
    window.onload = () => setGrid(4, 5); // 預設 4x5
</script>
</body>
</html>
