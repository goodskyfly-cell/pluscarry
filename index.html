<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>國小數學直式練習 - 進階分類版</title>
    <style>
        :root { --page-width: 210mm; --page-height: 297mm; }
        @page { size: A4; margin: 0; }
        body {
            margin: 0; padding: 0;
            background-color: #e9ecef;
            font-family: "Microsoft JhengHei", sans-serif;
            display: flex; flex-direction: column; align-items: center;
        }

        /* 操作面板 */
        .controls {
            background: #343a40; color: white;
            padding: 15px; width: 100%;
            text-align: center; position: sticky; top: 0; z-index: 100;
        }
        .btn {
            padding: 8px 15px; margin: 0 3px;
            font-size: 15px; cursor: pointer;
            border: none; border-radius: 4px; background: #495057; color: white;
        }
        .btn.active { background: #28a745; font-weight: bold; }
        .btn:hover { background: #6c757d; }

        /* A4 容器 */
        .a4-page {
            width: var(--page-width); height: var(--page-height);
            background: white; padding: 10mm 15mm;
            box-sizing: border-box; display: flex; flex-direction: column;
            overflow: hidden; box-shadow: 0 0 15px rgba(0,0,0,0.2); margin: 20px 0;
        }
        .header { text-align: center; margin-bottom: 10px; }
        .info-bar {
            display: flex; justify-content: space-around;
            font-size: 14pt; margin-bottom: 20px;
            border-bottom: 2px solid #333; padding-bottom: 10px;
        }

        /* 題目網格 */
        .problem-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(5, 1fr); flex-grow: 1; gap: 5px;
        }
        .math-box { display: flex; justify-content: center; align-items: center; }

        /* 直式核心結構 */
        .vertical-math {
            display: grid;
            grid-template-columns: 25px 35px 35px 35px; 
            grid-template-rows: 25px 45px 45px 5px 45px;
            font-size: 28pt; align-items: center; justify-items: center;
        }

        /* 進位虛線框 */
        .carry-box {
            width: 25px; height: 25px;
            border: 2px dashed #adb5bd;
            visibility: hidden;
        }
        .carry-box.visible { visibility: visible; }
        
        .carry-100 { grid-column: 2; grid-row: 1; } /* 百位進位框 */
        .carry-10 { grid-column: 3; grid-row: 1; }  /* 十位進位框 */

        .num-t { grid-column: 3; }
        .num-o { grid-column: 4; }
        .operator { grid-column: 1; grid-row: 3; font-size: 24pt; }
        .line { grid-column: 1 / span 4; grid-row: 4; border-bottom: 3px solid black; width: 100%; }

        @media print {
            .controls { display: none; }
            body { background: none; }
            .a4-page { margin: 0; box-shadow: none; }
        }
    </style>
</head>
<body>

<div class="controls">
    <button class="btn active" onclick="setMode('2-1', this)">二位 + 一位</button>
    <button class="btn" onclick="setMode('2-2-10', this)">二加二 (進十位)</button>
    <button class="btn" onclick="setMode('2-2-100', this)">二加二 (進百位)</button>
    <button class="btn" style="background: #e67e22;" onclick="generate()">↺ 重新出題</button>
</div>

<div class="a4-page">
    <div class="header"><h1 id="title">二位數加一位數進位練習</h1></div>
    <div class="info-bar">
        <span>班級：__________</span>
        <span>姓名：__________</span>
        <span>座號：____</span>
    </div>
    <div class="problem-grid" id="mainGrid"></div>
</div>

<script>
    let currentMode = '2-1';

    function setMode(mode, btn) {
        currentMode = mode;
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const titles = {
            '2-1': '二位數加一位數進位練習',
            '2-2-10': '二位數加二位數 (進位到十位)',
            '2-2-100': '二位數加二位數 (進位到百位)'
        };
        document.getElementById('title').innerText = titles[mode];
        generate();
    }

    function generate() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = '';

        for (let i = 0; i < 20; i++) {
            let n1_t, n1_o, n2_t = 0, n2_o;
            let isCarry10 = false, isCarry100 = false;

            if (currentMode === '2-1') {
                n1_t = Math.floor(Math.random() * 8) + 1;
                n1_o = Math.floor(Math.random() * 9) + 1;
                do { n2_o = Math.floor(Math.random() * 9) + 1; } while (n1_o + n2_o < 10);
                isCarry10 = true;
            } 
            else if (currentMode === '2-2-10') {
                // 僅進位到十位：個位相加 >= 10，但十位相加 (含進位) < 10
                do {
                    n1_t = Math.floor(Math.random() * 4) + 1; // 保持較小數字
                    n1_o = Math.floor(Math.random() * 9) + 1;
                    n2_t = Math.floor(Math.random() * 4) + 1;
                    n2_o = Math.floor(Math.random() * 9) + 1;
                    isCarry10 = (n1_o + n2_o >= 10);
                    let sumTens = n1_t + n2_t + (isCarry10 ? 1 : 0);
                    isCarry100 = (sumTens >= 10);
                } while (!isCarry10 || isCarry100);
            }
            else if (currentMode === '2-2-100') {
                // 進位到百位：十位相加 (含進位) >= 10
                do {
                    n1_t = Math.floor(Math.random() * 9) + 1;
                    n1_o = Math.floor(Math.random() * 9) + 1;
                    n2_t = Math.floor(Math.random() * 9) + 1;
                    n2_o = Math.floor(Math.random() * 9) + 1;
                    isCarry10 = (n1_o + n2_o >= 10);
                    let sumTens = n1_t + n2_t + (isCarry10 ? 1 : 0);
                    isCarry100 = (sumTens >= 10);
                } while (!isCarry100);
            }

            const item = document.createElement('div');
            item.className = 'math-box';
            item.innerHTML = `
                <div class="vertical-math">
                    <div class="carry-box carry-100 ${isCarry100 ? 'visible' : ''}"></div>
                    <div class="carry-box carry-10 ${isCarry10 ? 'visible' : ''}"></div>
                    <div class="num-t" style="grid-row: 2;">${n1_t}</div>
                    <div class="num-o" style="grid-row: 2;">${n1_o}</div>
                    <div class="operator">+</div>
                    <div class="num-t" style="grid-row: 3;">${n2_t || ''}</div>
                    <div class="num-o" style="grid-row: 3;">${n2_o}</div>
                    <div class="line"></div>
                </div>
            `;
            grid.appendChild(item);
        }
    }
    window.onload = generate;
</script>
</body>
</html>
